<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behind the scenes</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:black;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
            overflow-x:hidden;
        }

        /* ---------------- HOME PAGE ---------------- */

        .homepage{
            width:100%;
            min-height:100vh;
            padding:60px;
        }

        .title{
            font-size: 24px;
            letter-spacing:2px;
            margin-bottom:80px;
            opacity:0.6;
        }

        .station-list{
            display:flex;
            flex-direction:column;
            gap:25px;
        }

        .station-link{
            text-decoration:none;
            color:white;
            font-size:60px;
            font-weight:300;
            transition:0.3s;
            border-bottom:1px solid rgba(255,255,255,0.15);
            padding-bottom:10px;
        }

        .station-link:hover{
            opacity:0.4;
            transform:translateX(10px);
        }

        /* ---------------- STATION PAGE ---------------- */

        .station-page{
            width:100%;
            min-height:100vh;
            padding:60px;
            display:none;
        }

        .back-button{
            margin-bottom:60px;
            cursor:pointer;
            opacity:0.5;
            transition:0.3s;
        }

        .back-button:hover{
            opacity:1;
        }

        .station-name{
            font-size:90px;
            margin-bottom:60px;
            font-weight:300;
        }

        .content-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:60px;
        }

        .left-column img{
            width:100%;
            height:600px;
            object-fit:cover;
        }

        .info-block{
            margin-bottom:40px;
        }

        .info-title{
            font-size:40px;
            letter-spacing:2px;
            opacity:0.9;
            margin-bottom:10px;
        }

        .info-text{
            font-size:30px;
            line-height:1.6;
            opacity:0.9;
        }

        .association-chain{
            margin-top:60px;
            font-size:24px;
            line-height:1.8;
            opacity:0.7;
        }

        @media(max-width:900px){

            .station-link{
                font-size:36px;
            }

            .station-name{
                font-size:50px;
            }

            .content-grid{
                grid-template-columns:1fr;
            }

        }

    </style>
</head>
<body>


    <!-- ================= HOME PAGE ================= -->

    <section class="homepage" id="homepage">

    <div class="background-title">
    BEHIND THE SCENES
    </div>

        <div class="station-list">


    <div class="station-item" onclick="openStation('anzac')">

        <div class="station-text">
            ANZAC
        </div>

        <div class="station-image placeholder-box">
            <img src="1.jpg" alt="">
        </div>

    </div>



    <div class="station-item" onclick="openStation('townhall')">

        <div class="station-text">
            TOWN HALL
        </div>

        <div class="station-image placeholder-box">
            <img src="3.jpg" alt="">
        </div>

    </div>



    <div class="station-item" onclick="openStation('library')">

        <div class="station-text">
            STATE LIBRARY
        </div>

        <div class="station-image placeholder-box">
            <img src="7.jpg" alt="">
        </div>

    </div>



    <div class="station-item" onclick="openStation('parkville')">

        <div class="station-text">
            PARKVILLE
        </div>

        <div class="station-image placeholder-box">
            <img src="5.jpg" alt="">
        </div>

    </div>


</div>

    </section>



    <!-- ================= STATION PAGE ================= -->

    <section class="station-page" id="stationPage">

        <div class="back-button" onclick="goBack()">
            ← BACK
        </div>

        <div class="station-name" id="stationName">
            ANZAC
        </div>

        <div class="content-grid">

            <div class="left-column">

                <img
                id="stationImage"
                src=""
                alt="station image">
            </div>

            <div class="right-column">

                <div class="info-title" id="objectText"></div>
                <div class="info-text" id="observationText"></div>
                <div class="info-text" id="questionText"></div>
                <div class="association-chain" id="chainText"></div>


            </div>

        </div>

    </section>



    <script>


        const homepage = document.getElementById("homepage");
        const stationPage = document.getElementById("stationPage");

        const stationName = document.getElementById("stationName");



        const stationData = {

            anzac:{
                image:"images/anzac.jpg",
                image:"11.jpg",
                title:"ANZAC",
                object:"Lighting & Visibility",
                observation:"Artificial light replaces natural light underground. Brightness determines what can be seen and what remains hidden.",
                question:"Who decides how much visibility is enough?",
                chain:"Lighting › Brightness › Visibility › Safety › Compliance"
            },

            townhall:{
                image:"images/townhall.jpg",
                image:"8.jpg",
                title:"TOWN HALL",
                object:"Lighting & Movement",
                observation:"Light directs attention and influences movement. Passengers naturally follow illuminated routes and exits.",
                question:"Can lighting act as a silent instruction?",
                chain:"Lighting › Attention › Wayfinding › Crowd Flow › Behaviour"
            },

            library:{
                image:"images/library.jpg",
                image:"6.jpg",
                title:"STATE LIBRARY",
                object:"Lighting & Monitoring",
                observation:"Visibility supports surveillance systems. CCTV effectiveness depends on consistent lighting conditions.",
                question:"What needs to be visible?",
                chain:"Lighting › Visibility › Monitoring › Surveillance › Governance"
            },

            parkville:{
                image:"images/parkville.jpg",
                image:"9.jpg",
                title:"PARKVILLE",
                object:"Lighting & Emotion",
                observation:"Colour temperature affects comfort and perception. A feeling of safety can be designed through light.",
                question:"Is safety a physical condition or a psychological one?",
                chain:"Lighting › Colour Temperature › Comfort › Perception › Safety"
            }

        };


        const stationImage =
        document.getElementById("stationImage");


        function openStation(name){

            homepage.style.display = "none";
            stationPage.style.display = "block";

            const station = stationData[name];

            stationName.innerHTML = station.title;

            stationImage.src =
            stationData[name].image;

            document.getElementById("objectText").innerHTML =
            station.object;

            document.getElementById("observationText").innerHTML =
            station.observation;

            document.getElementById("questionText").innerHTML =
            station.question;

            document.getElementById("chainText").innerHTML =
            station.chain;

        }


        function goBack(){

            homepage.style.display = "block";
            stationPage.style.display = "none";

        }

    </script>

</body>
</html>
